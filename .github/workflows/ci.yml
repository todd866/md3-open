name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# This workflow does not consume any untrusted PR input (issue/PR
# body, commit messages, branch names). All `run` commands use only
# checked-in scripts and a hardcoded dummy DATABASE_URL.
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        # `prisma generate` only reads schema.prisma; no DB connection
        # needed. The dummy URL just satisfies the env-var presence check.
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: npx prisma generate

      - name: Tests
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: npm run test:run

      - name: Build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
        run: npm run build
